workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    environment:
      xcode: latest
    scripts:
      - name: Install dependencies
        script: |
          cd ios
          pod install || true

      - name: Build iOS app
        script: |
          xcodebuild -workspace ios/GasNowCookinggasdelivered.xcworkspace \
          -scheme GasNowCookinggasdelivered \
          -configuration Release \
          -sdk iphoneos \
          -archivePath $CM_BUILD_DIR/build/App.xcarchive archive

      - name: Export IPA
        script: |
          xcodebuild -exportArchive \
          -archivePath $CM_BUILD_DIR/build/App.xcarchive \
          -exportPath $CM_BUILD_DIR/build/ipa \
          -exportOptionsPlist ios/ExportOptions.plist

    artifacts:
      - build/ipa/*.ipa
